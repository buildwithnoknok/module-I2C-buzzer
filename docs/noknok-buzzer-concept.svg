<svg viewBox="0 0 980 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <rect x="0" y="0" width="980" height="440" rx="16" fill="#0f1117"/>
  <text x="490" y="36" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="600">noknok Buzzer - Concept</text>
  <text x="490" y="58" text-anchor="middle" fill="#6b7280" font-size="12">Conductor (Pico)  &lt;-&gt;  Musician (CH32V003)   .   I2C over JST SH 4-pin</text>

  <!-- LEFT PANEL: Conductor -->
  <rect x="30" y="84" width="360" height="320" rx="14" fill="#161922" stroke="#2a2d3a"/>
  <circle cx="52" cy="112" r="6" fill="#34d399"/>
  <text x="68" y="117" fill="#e8eaf0" font-size="15" font-weight="600">Conductor</text>
  <text x="372" y="116" text-anchor="end" fill="#6b7280" font-size="11">Raspberry Pi Pico</text>
  <line x1="30" y1="132" x2="390" y2="132" stroke="#2a2d3a"/>

  <text x="52" y="156" fill="#8b93a7" font-size="11">What you write (Python)</text>
  <rect x="52" y="164" width="316" height="30" rx="6" fill="#0d1f1a" stroke="#1f3d34"/>
  <text x="64" y="184" fill="#34d399" font-size="13" font-family="monospace">buzzer.play(440, 2.0)</text>

  <text x="52" y="222" fill="#8b93a7" font-size="11">What goes over I2C - single note (5 bytes)</text>
  <g font-family="monospace" text-anchor="middle">
    <rect x="52"  y="230" width="60" height="42" rx="6" fill="#1e1b4b" stroke="#6366f1"/>
    <text x="82"  y="256" fill="#c7d2fe" font-size="13">0x01</text>
    <text x="82"  y="286" fill="#6b7280" font-size="9.5" font-family="sans-serif">CMD</text>
    <rect x="116" y="230" width="60" height="42" rx="6" fill="#082f49" stroke="#0ea5e9"/>
    <text x="146" y="256" fill="#bae6fd" font-size="13">0x01</text>
    <text x="146" y="286" fill="#6b7280" font-size="9.5" font-family="sans-serif">F-hi</text>
    <rect x="180" y="230" width="60" height="42" rx="6" fill="#082f49" stroke="#0ea5e9"/>
    <text x="210" y="256" fill="#bae6fd" font-size="13">0xB8</text>
    <text x="210" y="286" fill="#6b7280" font-size="9.5" font-family="sans-serif">F-lo</text>
    <rect x="244" y="230" width="60" height="42" rx="6" fill="#451a03" stroke="#f59e0b"/>
    <text x="274" y="256" fill="#fde68a" font-size="13">0x14</text>
    <text x="274" y="286" fill="#6b7280" font-size="9.5" font-family="sans-serif">DUR</text>
    <rect x="308" y="230" width="60" height="42" rx="6" fill="#052e1a" stroke="#10b981"/>
    <text x="338" y="256" fill="#a7f3d0" font-size="13">0x64</text>
    <text x="338" y="286" fill="#6b7280" font-size="9.5" font-family="sans-serif">VOL</text>
  </g>
  <text x="52" y="312" fill="#4b5563" font-size="10">Example: 440 Hz . 2.0 s . 100% volume</text>
  <text x="52" y="344" fill="#8b93a7" font-size="11" font-family="monospace">Tune: [0x02][id]  (2 bytes)</text>
  <text x="52" y="366" fill="#8b93a7" font-size="11" font-family="monospace">Stop: [0x00]  (1 byte)</text>

  <!-- MIDDLE: I2C BUS -->
  <text x="490" y="104" text-anchor="middle" fill="#8b93a7" font-size="11" font-weight="600">I2C Bus</text>
  <g stroke-width="2">
    <line x1="392" y1="150" x2="588" y2="150" stroke="#6b7280"/>
    <line x1="392" y1="178" x2="588" y2="178" stroke="#ef4444"/>
    <line x1="392" y1="206" x2="588" y2="206" stroke="#3b82f6"/>
    <line x1="392" y1="234" x2="588" y2="234" stroke="#a855f7"/>
  </g>
  <g text-anchor="middle" font-size="10.5" font-family="monospace">
    <rect x="462" y="142" width="56" height="16" fill="#0f1117"/><text x="490" y="154" fill="#9ca3af">GND</text>
    <rect x="462" y="170" width="56" height="16" fill="#0f1117"/><text x="490" y="182" fill="#fca5a5">3.3V</text>
    <rect x="462" y="198" width="56" height="16" fill="#0f1117"/><text x="490" y="210" fill="#93c5fd">SDA</text>
    <rect x="462" y="226" width="56" height="16" fill="#0f1117"/><text x="490" y="238" fill="#d8b4fe">SCL</text>
  </g>
  <g>
    <line x1="404" y1="270" x2="566" y2="270" stroke="#34d399" stroke-width="2"/>
    <polygon points="566,266 578,270 566,274" fill="#34d399"/>
    <text x="490" y="288" text-anchor="middle" fill="#6b7280" font-size="10">commands + data</text>
    <line x1="576" y1="306" x2="414" y2="306" stroke="#fbbf24" stroke-width="2"/>
    <polygon points="414,302 402,306 414,310" fill="#fbbf24"/>
    <text x="490" y="324" text-anchor="middle" fill="#6b7280" font-size="10">status reply (1 byte)</text>
  </g>
  <rect x="430" y="356" width="120" height="26" rx="13" fill="#1c1917" stroke="#3f3f46"/>
  <circle cx="448" cy="369" r="5" fill="#fbbf24"/>
  <text x="464" y="373" fill="#d4d4d8" font-size="11">JST SH 4-pin</text>

  <!-- RIGHT PANEL: Musician -->
  <rect x="590" y="84" width="360" height="320" rx="14" fill="#161922" stroke="#2a2d3a"/>
  <circle cx="612" cy="112" r="6" fill="#fbbf24"/>
  <text x="628" y="117" fill="#e8eaf0" font-size="15" font-weight="600">Musician - Buzzer</text>
  <text x="932" y="116" text-anchor="end" fill="#6b7280" font-size="11">CH32V003 . 16KB flash</text>
  <line x1="590" y1="132" x2="950" y2="132" stroke="#2a2d3a"/>

  <rect x="612" y="148" width="316" height="30" rx="6" fill="#2a1e05" stroke="#854d0e"/>
  <text x="628" y="168" fill="#fbbf24" font-size="12" font-weight="600">Fire and forget - timer runs in background</text>

  <text x="612" y="202" fill="#8b93a7" font-size="11">Firmware does the rest:</text>
  <g font-size="11.5">
    <text x="624" y="224" fill="#e8eaf0" font-family="monospace">0x01</text><text x="672" y="224" fill="#9ca3af">play note (set PWM + timer)</text>
    <text x="624" y="246" fill="#e8eaf0" font-family="monospace">0x02</text><text x="672" y="246" fill="#9ca3af">play tune (sequence from flash)</text>
    <text x="624" y="268" fill="#e8eaf0" font-family="monospace">0x00</text><text x="672" y="268" fill="#9ca3af">stop immediately</text>
    <text x="624" y="290" fill="#e8eaf0" font-family="monospace">READ</text><text x="672" y="290" fill="#9ca3af">0x01 playing / 0x00 idle</text>
  </g>
  <text x="612" y="324" fill="#8b93a7" font-size="11">5 tunes in flash (read-only):</text>
  <text x="612" y="346" fill="#a78bfa" font-size="11">Nokia . Happy Birthday . Beep OK</text>
  <text x="612" y="366" fill="#a78bfa" font-size="11">Beep Error . Startup Chime</text>
</svg>